<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1430"/>
      <stop offset="0.45" stop-color="#10204d"/>
      <stop offset="0.8" stop-color="#15346e"/>
      <stop offset="1" stop-color="#0d2a63"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.25" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.42" cy="1" r="0.85">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="0.45" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.9" cy="0.75" r="0.55">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#a5e8ff" fill-opacity="0.9"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#fff" stop-opacity="1"/>
    </linearGradient>
    <mask id="wave">
      <rect width="1600" height="1000" fill="url(#fade)"/>
      <path d="M0,520 C300,420 560,620 860,520 C1140,430 1360,600 1600,500 L1600,1000 L0,1000 Z" fill="#000"/>
    </mask>
    <filter id="soft"><feGaussianBlur stdDeviation="46"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glowA)"/>
  <ellipse cx="660" cy="1000" rx="980" ry="560" fill="url(#glowB)"/>
  <ellipse cx="1440" cy="760" rx="520" ry="460" fill="url(#glowC)"/>

  <!-- particle field -->
  <g mask="url(#wave)">
    <rect width="1600" height="1000" fill="url(#dots)" opacity="0.6"/>
  </g>

  <!-- glowing crest -->
  <path d="M0,520 C300,420 560,620 860,520 C1140,430 1360,600 1600,500"
        fill="none" stroke="#7df0ff" stroke-opacity="0.55" stroke-width="2.5" filter="url(#soft)"/>
  <path d="M0,520 C300,420 560,620 860,520 C1140,430 1360,600 1600,500"
        fill="none" stroke="#bff4ff" stroke-opacity="0.35" stroke-width="1.2"/>
</svg>
